name: Agentic Auto Tag (Plan & Propose)

on:
  pull_request:
    types: [opened, synchronize] # Runs when a PR is created or updated

# GH-600 Domain: Principle of Least Privilege
permissions:
  contents: read
  pull-requests: write # Required to post the HITL comment

jobs:
  plan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install google-genai requests

      - name: Run Agent Reasoning
        id: agent
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # Capture stderr (JSON) to a file, and stdout (Tag) to a variable
          python .github/scripts/suggest_tag.py 2> agent_reasoning.json > stdout.txt
          
          NEW_TAG=$(cat stdout.txt)
          echo "next_tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Post HITL Comment to PR
        if: steps.agent.outputs.next_tag != 'none'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Built-in GitHub Action token
        run: |
          # Read the JSON file into a variable
          REASONING=$(cat agent_reasoning.json)
          
          # Use the GitHub CLI to post the agent's plan to the PR
          gh pr comment ${{ github.event.pull_request.number }} \
            --body "🤖 **Agentic Version Planner**
            
            I have analyzed the commits and recommend the following Semantic Version tag: **${{ steps.agent.outputs.next_tag }}**
            
            <details>
            <summary>Click to view Agent Reasoning (JSON)</summary>
            
            \`\`\`json
            $REASONING
            \`\`\`
            </details>
            
            ---
            **Human-in-the-Loop Action Required:**
            If you agree with this plan, reply to this PR with exactly:
            \`/approve-tag ${{ steps.agent.outputs.next_tag }}\`"